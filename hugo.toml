# Cấu hình Hugo cho sumvo.site
# Theme: hugo-book (giao diện docs/wiki kiểu BookStack)

baseURL = 'https://sumvo.site/'
title = 'sumvo'
theme = 'hugo-book'
locale = 'vi'
defaultContentLanguage = 'vi'

disablePathToLower = true
enableGitInfo = false

[pagination]
  pagerSize = 10

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
  [markup.highlight]
    style = 'base16-snazzy'

[taxonomies]
  tag = 'tags'
  category = 'categories'

[menu]
  # Menu trên trang chủ
  [[menu.home]]
    name = 'Tài liệu'
    pageRef = '/docs/'
    weight = 1
  [[menu.home]]
    name = 'Blog'
    pageRef = '/posts/'
    weight = 2
  [[menu.home]]
    name = 'Books'
    pageRef = '/books/'
    weight = 3
  [[menu.home]]
    name = 'Enterprise Architecture'
    pageRef = '/enterprise-architecture/'
    weight = 4

  # Menu cuối sidebar
  [[menu.after]]
    name = 'Blog'
    pageRef = '/posts/'
    weight = 10
  [[menu.after]]
    name = 'Books'
    pageRef = '/books/'
    weight = 20
  [[menu.after]]
    name = 'Enterprise Architecture'
    pageRef = '/enterprise-architecture/'
    weight = 30

[params]
  # light / dark / auto
  BookTheme = 'auto'

  # Hiện mục lục bên phải mỗi trang
  BookToC = true

  # Section gốc render thành menu sidebar (giống cây sách/chương/trang BookStack)
  BookSection = 'docs'

  # Repo chứa source — sửa lại sau khi tạo repo GitHub
  BookRepo = 'https://github.com/sumvoit/sumvosite'
  # BookEditLink = '{{ .Site.Params.BookRepo }}/edit/main/{{ .Path }}'

  BookDateFormat = '02/01/2006'

  # Tìm kiếm client-side bằng fuse.js
  BookSearch = true

  BookComments = false
  BookPortableLinks = 'warning'
  BookServiceWorker = false
